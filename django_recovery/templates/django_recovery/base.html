{% extends "admin/base_site.html" %}

{% block title %}Recovery{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
  .recovery-banner {
    padding: 10px 14px;
    margin: 12px 0;
    border-radius: 4px;
    border: 1px solid transparent;
  }
  .recovery-banner.info {
    background: #e7f3fe;
    border-color: #b6d8fb;
    color: #084298;
  }
  .recovery-banner.error {
    background: #fdecea;
    border-color: #f5c2c0;
    color: #842029;
  }
  .recovery-actions {
    margin: 16px 0;
  }
  table.recovery {
    border-collapse: collapse;
    width: 100%;
    margin: 12px 0 28px;
  }
  table.recovery th,
  table.recovery td {
    border: 1px solid #ddd;
    padding: 8px 10px;
    text-align: left;
    vertical-align: top;
  }
  table.recovery th {
    background: #f5f5f5;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .badge-pending { background: #6c757d; }
  .badge-running { background: #0d6efd; }
  .badge-success { background: #198754; }
  .badge-failed  { background: #dc3545; }
  details.recovery-drop {
    margin-bottom: 6px;
  }
  details.recovery-drop summary {
    cursor: pointer;
    font-weight: 600;
  }
  details.recovery-drop form {
    padding: 8px 0 4px 12px;
  }
  details.recovery-drop label {
    display: block;
    margin: 4px 0;
  }
  .recovery-warning {
    color: #842029;
    font-size: 13px;
    margin: 6px 0;
  }
  pre#log {
    background: #1e1e1e;
    color: #e6e6e6;
    padding: 14px;
    border-radius: 4px;
    overflow: auto;
    max-height: 480px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .recovery-timestamps {
    color: #555;
    font-size: 13px;
    margin: 8px 0;
  }
</style>
{% endblock %}

{% block content %}{% endblock %}
