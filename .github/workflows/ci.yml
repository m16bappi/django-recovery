name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff (django-recovery)
        run: ruff check django_recovery tests

  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install package
        run: pip install -e ".[test]"
      - name: Unit tests (no real restic)
        run: pytest -q -m "not integration"

  integration:
    name: integration (real restic + sqlite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install restic and sqlite3
        # apt ships an old restic without --stdin-from-command (needs >= 0.16),
        # so install a pinned official release binary instead.
        env:
          RESTIC_VERSION: "0.19.1"
        run: |
          curl -fsSL -o restic.bz2 \
            "https://github.com/restic/restic/releases/download/v${RESTIC_VERSION}/restic_${RESTIC_VERSION}_linux_amd64.bz2"
          bunzip2 restic.bz2
          chmod +x restic
          sudo mv restic /usr/local/bin/restic
          sudo apt-get update && sudo apt-get install -y sqlite3
          restic version
      - name: Install package
        run: pip install -e ".[test]"
      - name: Integration tests
        run: pytest -q -m integration
